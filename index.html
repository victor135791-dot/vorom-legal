<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOROM</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 720px;
    margin: 4em auto;
    padding: 0 1.25em 6em;
    line-height: 1.6;
    text-align: center;
  }
  h1 { font-size: 2.5em; letter-spacing: 0.02em; margin-bottom: 0.25em; }
  .tagline { color: #666; font-size: 1.1em; margin-bottom: 3em; }
  .links { display: flex; flex-direction: column; gap: 0.75em; align-items: center; }
  .links a {
    display: inline-block;
    padding: 0.75em 1.5em;
    background: #007aff;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    min-width: 200px;
  }
  .links a:hover { background: #0051d5; }
  .contact { margin-top: 4em; font-size: 0.9em; color: #666; }
  .contact a { color: #007aff; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #f2f2f7; }
    .tagline, .contact { color: #aaa; }
    .links a { background: #0a84ff; }
    .links a:hover { background: #5eb1ff; }
    .contact a { color: #0a84ff; }
  }
</style>
</head>
<body>

<img src="logo.png" alt="VOROM logo" style="width: 120px; height: auto; margin-bottom: 1.5em;">
<h1>VOROM</h1>
<p class="tagline">Strength + cardio training, synced across your devices with Pro.</p>

<div class="links">
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
</div>

<p class="contact">Contact: <a href="mailto:support@vorom.app">support@vorom.app</a></p>

</body>
</html>
