<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOROM</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 720px;
    margin: 4em auto;
    padding: 0 1.25em 6em;
    line-height: 1.6;
    text-align: center;
  }
  h1 { font-size: 2.5em; letter-spacing: 0.02em; margin-bottom: 0.25em; }
  .tagline { color: #666; font-size: 1.1em; margin-bottom: 2em; }
  .hero-video {
    display: block; width: 100%; border-radius: 18px; margin: 0 auto 2.25em;
    box-shadow: 0 18px 50px rgba(0,0,0,0.28); background: #06080f; border: 0;
  }
  .store { margin-bottom: 2.75em; }
  .store a { display: inline-block; }
  .store img { height: 54px; width: auto; }
  .links { display: flex; flex-direction: column; gap: 0.75em; align-items: center; }
  .links a {
    display: inline-block;
    padding: 0.75em 1.5em;
    background: #007aff;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    min-width: 200px;
  }
  .links a:hover { background: #0051d5; }
  .contact { margin-top: 4em; font-size: 0.9em; color: #666; }
  .contact a { color: #007aff; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #f2f2f7; }
    .tagline, .contact { color: #aaa; }
    .links a { background: #0a84ff; }
    .links a:hover { background: #5eb1ff; }
    .contact a { color: #0a84ff; }
  }
</style>
</head>
<body>

<img src="logo.png" alt="VOROM logo" style="width: 120px; height: auto; margin-bottom: 1.5em;">
<h1>VOROM</h1>
<p class="tagline">Privacy-first, on-device strength + cardio training for iPhone and Apple Watch.</p>

<video class="hero-video" autoplay muted loop playsinline preload="metadata" poster="promo_poster.jpg" aria-label="VOROM app promo">
  <source src="promo.mp4" type="video/mp4">
</video>

<div class="store">
  <a href="https://apps.apple.com/app/id6773281995" aria-label="Download VOROM on the App Store">
    <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
  </a>
</div>

<div class="links">
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
</div>

<p class="contact">Contact: <a href="mailto:support@vorom.app">support@vorom.app</a></p>

</body>
</html>
